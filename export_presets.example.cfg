; Vorlage fuer die Export-Voreinstellungen.
;
; export_presets.cfg selbst liegt bewusst NICHT im Repo (kann lokale Pfade
; enthalten). Einmalig kopieren:
;
;     copy export_presets.example.cfg export_presets.cfg      (Windows)
;     cp export_presets.example.cfg export_presets.cfg        (Linux)
;
; Vorher im Editor unter  Editor > Exportvorlagen verwalten  die Vorlagen
; fuer Godot 4.7.1 herunterladen. Danach exportiert tools/export_beta.ps1
; beide Builds auf einen Schlag.

[preset.0]

name="Windows Client"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/windows/extraction_shooter.exe"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

binary_format/embed_pck=true
binary_format/architecture="x86_64"
application/modify_resources=true

[preset.1]

